<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML tab</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">

  <header>
    <div class="header-left">
      <h1 id="greeting">HTML tab</h1>
    </div>
    <div class="header-right">
      <button class="header-btn" id="btn-scan-folder" title="扫描电脑里所有 HTML 文件">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.6" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 0 1 4.5 9.75h15A2.25 2.25 0 0 1 21.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z"/>
        </svg>
        <span>扫描本地 HTML</span>
      </button>
      <button class="icon-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
      </button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
      </span>
      <input id="search" placeholder="搜索标题、路径、域名..." autocomplete="off">
    </div>
  </div>

  <!-- 类别筛选 chips -->
  <div class="category-bar" id="category-bar"></div>

  <div class="stats" id="stats" style="display:none"></div>

  <section class="section" id="section-pinned" style="display:none">
    <div class="section-header">
      <h2>置顶</h2>
      <div class="section-line"></div>
      <div class="section-count" id="count-pinned"></div>
    </div>
    <div class="grid" id="grid-pinned"></div>
  </section>

  <section class="section" id="section-recent">
    <div class="grid" id="grid-recent"></div>
  </section>

  <div class="empty" id="empty" style="display:none">
    Nothing here yet.
    <div class="hint">在 Chrome 里打开任何 HTML 页面（包括 file:// 本地文件），它就会出现在这里。</div>
  </div>

  <footer class="footer">
    <span id="footer-info"></span>
  </footer>
</main>

<!-- 编辑模态框 -->
<div class="modal-mask" id="modal-mask">
  <div class="modal" role="dialog" aria-modal="true">
    <h3 id="modal-title">编辑</h3>
    <div class="modal-sub" id="modal-url"></div>

    <div class="modal-quick" id="modal-quick" style="display:none">
      <button class="btn" id="modal-open-dir">📂 打开所在目录</button>
      <button class="btn" id="modal-copy-path">📋 复制完整路径</button>
    </div>

    <label>标签 (用逗号或空格分隔)</label>
    <input id="modal-tags" placeholder="例：竞品, 周报, ai-insights">

    <label>备注</label>
    <textarea id="modal-note" placeholder="为这个页面写点说明..."></textarea>

    <div class="modal-actions">
      <button class="btn danger" id="modal-delete">删除记录</button>
      <span style="flex:1"></span>
      <button class="btn" id="modal-cancel">取消</button>
      <button class="btn primary" id="modal-save">保存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
